services:
    bot:
        build:
            context: .
            args:
                DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-olimp_bot_payment}?schema=public
        restart: always
        env_file: .env
        # Внешний порт 3001 (основной бот занимает 3000), внутри контейнера 3000.
        ports:
            - '${HOST_PORT:-3001}:3000'
        logging:
            driver: 'json-file'
            options:
                max-size: '10m'
                max-file: '3'
        depends_on:
            db:
                condition: service_healthy
            redis:
                condition: service_started
        environment:
            DATABASE_URL: postgresql://${POSTGRES_USER:-user}:${POSTGRES_PASSWORD:-password}@db:5432/${POSTGRES_DB:-olimp_bot_payment}?schema=public
            REDIS_URL: redis://redis:6379
            # Внутри контейнера всегда 3000; наружу пробрасывается HOST_PORT (3001).
            PORT: 3000

    db:
        image: postgres:18-alpine
        restart: always
        # Внешний порт 5434 (основной бот может занимать 5433).
        ports:
            - '${DB_HOST_PORT:-5434}:5432'
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-user}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
            POSTGRES_DB: ${POSTGRES_DB:-olimp_bot_payment}
        volumes:
            - postgres_data:/var/lib/postgresql
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-olimp_bot_payment}',
                ]
            interval: 5s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8-alpine
        restart: always
        volumes:
            - redis_data:/data

volumes:
    postgres_data:
    redis_data:
